server {
    listen 80;
    server_name polexpert.ru www.polexpert.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://polexpert.ru$request_uri;
    }
}

server {
    listen 80;
    server_name cms.polexpert.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://cms.polexpert.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name polexpert.ru www.polexpert.ru;

    ssl_certificate     /etc/nginx/ssl/live/polexpert.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/polexpert.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Загруженные файлы (фото кейсов, логотипы и т.д.)
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Статика фронтенда
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }
}

server {
    listen 443 ssl;
    server_name cms.polexpert.ru;

    ssl_certificate     /etc/nginx/ssl/live/cms.polexpert.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/cms.polexpert.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://cms:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
